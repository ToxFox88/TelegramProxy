name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget curl
          
      - name: Install Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          export PATH=$PATH:$PWD/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer cython
          
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Telegram Proxy
package.name = telegramproxy
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atxt
version = 1.0
requirements = python3,kivy
orientation = portrait
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a
android.accept_sdk_license = True
android.debug = True

[buildozer]
log_level = 2
warn_on_root = 1
EOF
          
      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug > build.log 2>&1
          
      - name: Find APK
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f -exec cp {} ./ \;
          ls -la *.apk || echo "No APK found"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: "*.apk"
          if-no-files-found: warn
          
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
