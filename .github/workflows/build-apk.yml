name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget curl openjdk-17-jdk
      
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Verify Buildozer
        run: |
          which buildozer || echo "Buildozer not found"
          buildozer --version || echo "Buildozer failed to run"
      
      - name: Create simple buildozer.spec
        run: |
          echo "[app]" > buildozer.spec
          echo "title = Telegram Proxy" >> buildozer.spec
          echo "package.name = telegramproxy" >> buildozer.spec
          echo "package.domain = org.example" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "source.include_exts = py,png,jpg,kv,atxt" >> buildozer.spec
          echo "version = 1.0" >> buildozer.spec
          echo "requirements = python3,kivy" >> buildozer.spec
          echo "orientation = portrait" >> buildozer.spec
          echo "android.permissions = INTERNET" >> buildozer.spec
          echo "android.api = 30" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.ndk = 23b" >> buildozer.spec
          echo "android.archs = arm64-v8a" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[buildozer]" >> buildozer.spec
          echo "log_level = 2" >> buildozer.spec
      
      - name: Try to build
        run: |
          buildozer init
          echo "Buildozer initialized"
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: buildozer.spec
