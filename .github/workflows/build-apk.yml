name: Build APK

on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 📁 Проверка файлов
        run: |
          echo "=== СОДЕРЖИМОЕ ПАПКИ ==="
          ls -la
          echo ""
          echo "=== ПРОВЕРКА main.py ==="
          if [ -f "main.py" ]; then
            echo "✅ main.py найден"
            echo "--- Первые 5 строк main.py ---"
            head -n 5 main.py
          else
            echo "❌ main.py НЕ НАЙДЕН!"
            exit 1
          fi
          echo ""
          echo "=== ПРОВЕРКА buildozer.spec ==="
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec найден"
            echo "--- Содержимое buildozer.spec ---"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec НЕ НАЙДЕН!"
            exit 1
          fi
      
      - name: ☕ Установка Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Установка системных зависимостей
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            curl
          
      - name: 📦 Установка Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          
          # Принимаем лицензии
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
          
      - name: 📦 Установка Python пакетов
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer cython
          
      - name: 🔧 Попытка сборки с подробным логом
        run: |
          export PATH=$PATH:~/.local/bin
          echo "=== НАЧАЛО СБОРКИ ==="
          buildozer android debug 2>&1 | tee build.log || true
          echo "=== КОНЕЦ СБОРКИ ==="
          
      - name: 📋 Анализ лога
        if: always()
        run: |
          echo "=== ПОСЛЕДНИЕ 50 СТРОК ЛОГА ==="
          if [ -f "build.log" ]; then
            tail -n 50 build.log
            echo ""
            echo "=== ПОИСК ОШИБОК ==="
            grep -i "error\|exception\|failed" build.log | tail -n 20
          else
            echo "❌ Файл build.log не создался"
          fi
          
      - name: 📤 Загрузка лога
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          
      - name: 📤 Загрузка APK (если создался)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: bin/*.apk
