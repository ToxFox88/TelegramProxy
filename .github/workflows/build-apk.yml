name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget curl openjdk-17-jdk
      
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Verify Buildozer
        run: |
          which buildozer
          buildozer --version
      
      - name: Show files
        run: |
          ls -la
          echo "=== Содержимое buildozer.spec ==="
          cat buildozer.spec || echo "buildozer.spec не найден"
      
      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug
      
      - name: Find and upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: bin/*.apk
      
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
