name: Build APK

on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Установка Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Установка зависимостей
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget curl
          
      - name: 🤖 Установка Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          
      - name: 📦 Установка Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer cython
          
      - name: 📝 Создание правильного buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Telegram Proxy
package.name = telegramproxy
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atxt
version = 1.0
requirements = python3,kivy
orientation = portrait
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a
android.accept_sdk_license = True
android.debug = True
[buildozer]
log_level = 2
warn_on_root = 1
EOF
          echo "✅ buildozer.spec создан"
          cat buildozer.spec
          
      - name: 🔧 Сборка APK
        run: |
          export PATH=$PATH:~/.local/bin
          echo "=== НАЧАЛО СБОРКИ ==="
          buildozer android debug 2>&1 | tee build.log
          echo "=== КОНЕЦ СБОРКИ ==="
          
      - name: 🔍 ПОИСК APK (УЛУЧШЕННЫЙ)
        run: |
          echo "=== ПОИСК ВСЕХ APK ФАЙЛОВ ==="
          find . -name "*.apk" -type f -ls
          echo ""
          echo "=== КОПИРОВАНИЕ APK В ИЗВЕСТНОЕ МЕСТО ==="
          mkdir -p apk-output
          find . -name "*.apk" -type f -exec cp {} apk-output/ \;
          ls -la apk-output/
          echo ""
          echo "=== ЕСЛИ APK НЕ НАЙДЕН, ИЩЕМ ГЛУБЖЕ ==="
          find . -type d -name "bin" -exec ls -la {} \; || echo "Папки bin нет"
          find . -type d -name "build" -exec ls -la {} \; || echo "Папки build нет"
          
      - name: 📤 Загрузка APK (гарантированно)
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: |
            **/*.apk
            apk-output/*.apk
          if-no-files-found: warn
          
      - name: 📤 Загрузка лога
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
