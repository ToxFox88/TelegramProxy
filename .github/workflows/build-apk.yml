name: Build APK

on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 📁 Проверка файлов
        run: |
          echo "=== СОДЕРЖИМОЕ ПАПКИ ==="
          ls -la
          echo ""
          echo "=== ПРОВЕРКА main.py ==="
          if [ -f "main.py" ]; then
            echo "✅ main.py найден"
          else
            echo "❌ main.py НЕ НАЙДЕН!"
            exit 1
          fi
          echo "=== ПРОВЕРКА buildozer.spec ==="
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec найден"
          else
            echo "❌ buildozer.spec НЕ НАЙДЕН!"
            exit 1
          fi
      
      - name: ☕ Установка Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Установка зависимостей
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libncurses-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            curl
          
      - name: 📦 Установка Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer cython
          
      - name: 🔧 Сборка APK с полным логом
        run: |
          export PATH=$PATH:~/.local/bin
          echo "=== НАЧАЛО СБОРКИ ==="
          buildozer android debug > build.log 2>&1 || true
          echo "=== КОНЕЦ СБОРКИ ==="
          
      - name: 🔍 Поиск APK после сборки
        run: |
          echo "=== ПОИСК APK ФАЙЛОВ ==="
          find . -name "*.apk" -type f
          echo ""
          echo "=== СОДЕРЖИМОЕ ПАПКИ BIN (если есть) ==="
          ls -la bin/ || echo "Папки bin нет"
          echo ""
          echo "=== СОДЕРЖИМОЕ ВСЕХ ПАПОК ==="
          find . -type d | head -20
          
      - name: 📋 Анализ лога сборки
        run: |
          echo "=== ПОСЛЕДНИЕ 50 СТРОК ЛОГА ==="
          tail -50 build.log
          echo ""
          echo "=== ПОИСК ОШИБОК В ЛОГЕ ==="
          grep -i "error\|exception\|failed" build.log | tail -20 || echo "Явных ошибок не найдено"
          
      - name: 📤 Загрузка лога
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          
      - name: 📤 Загрузка APK (если найден)
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: "**/*.apk"
