name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget curl openjdk-17-jdk
      
      - name: Install Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
      
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Show buildozer.spec
        run: |
          echo "=== СОДЕРЖИМОЕ buildozer.spec ==="
          cat buildozer.spec
      
      - name: Build APK with full log
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_HOME=$HOME/android-sdk
          buildozer -v android debug 2>&1 | tee full_build.log
      
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: full_build.log
      
      - name: Find and upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: bin/*.apk
